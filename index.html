<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importador de Históricos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            background: #606c88;
            background: -webkit-linear-gradient(to right, #3f4c6b, #606c88);
            background: linear-gradient(to right, #3f4c6b, #606c88);
            min-height: 100vh;
            font-family: 'Ubuntu', sans-serif;
            font-weight: 300;
            color: #fff;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px border rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(0px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: backdrop-filter 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .pagination-btn {
            padding: 5px 12px;
            margin: 0 2px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .pagination-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .pagination-btn.active {
            background: #3f4c6b;
            font-weight: bold;
        }

        input, textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 5px;
            padding: 8px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loader" class="loader-overlay">
        <div class="text-center">
            <div class="spinner mx-auto mb-4"></div>
            <p id="loader-text" class="text-xl font-semibold">Carregando...</p>
            <p id="loader-percent" class="text-sm">0%</p>
        </div>
    </div>

    <!-- Modal Inicial -->
    <div id="initial-modal" class="modal-overlay">
        <div class="glass-card p-8 max-w-md w-full text-center">
            <h2 class="text-2xl font-bold mb-6">Importar Históricos</h2>
            <p class="mb-6 opacity-80">Selecione o arquivo PDF contendo os históricos para começar.</p>
            <input type="file" id="pdf-upload" accept=".pdf" class="hidden">
            <button onclick="document.getElementById('pdf-upload').click()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold transition-all w-full mb-2">
                <i class="fas fa-file-pdf mr-2"></i> Selecionar PDF
            </button>
        </div>
    </div>

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold tracking-tight">HISTÓRICOS</h1>
            <div class="flex gap-2">
                <a href="https://raw.githubusercontent.com/iramalho1980/historicos_contabeis/019931a48cea2420a7112ff9828952a219b72dd1/conj_dados_historicos.xml" 
                   download="conj_dados_historicos.xml"
                   class="glass-card px-4 py-2 hover:bg-white/20 transition-all flex items-center"
                   title="Baixar XML do GitHub">
                    <i class="fab fa-github mr-1"></i> Baixar XML
                </a>
                <button onclick="showImportModal()" class="glass-card px-4 py-2 hover:bg-white/20 transition-all">
                    <i class="fas fa-plus mr-1"></i> Nova Importação
                </button>
                <button onclick="generateTxt()" class="bg-green-600 hover:bg-green-700 px-6 py-2 rounded-lg font-bold transition-all">
                    <i class="fas fa-download mr-1"></i> GERAR TXT
                </button>
            </div>
        </header>

        <div class="glass-card overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-white/10">
                    <tr>
                        <th class="p-4 w-24">CÓDIGO</th>
                        <th class="p-4">DESCRIÇÃO</th>
                        <th class="p-4 w-32 text-center">AÇÕES</th>
                    </tr>
                </thead>
                <tbody id="historicos-list">
                    <!-- Dinâmico -->
                </tbody>
            </table>
            
            <div id="pagination" class="p-4 border-t border-white/10 flex justify-center items-center gap-2">
                <!-- Dinâmico -->
            </div>
        </div>
    </div>

    <!-- Modal de Edição -->
    <div id="edit-modal" class="modal-overlay hidden">
        <div class="glass-card p-8 max-w-lg w-full">
            <h2 class="text-xl font-bold mb-4">Editar Histórico</h2>
            <div class="flex flex-col gap-4">
                <div>
                    <label class="block text-sm opacity-70 mb-1">Código</label>
                    <input type="text" id="edit-codigo" class="w-full" readonly>
                </div>
                <div>
                    <label class="block text-sm opacity-70 mb-1">Descrição</label>
                    <textarea id="edit-descricao" class="w-full h-32" rows="4"></textarea>
                </div>
                <div class="flex justify-end gap-2 mt-4">
                    <button onclick="closeEditModal()" class="px-4 py-2 hover:bg-white/10 rounded">Cancelar</button>
                    <button onclick="saveEdit()" class="bg-blue-600 px-6 py-2 rounded font-bold">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let allHistoricos = JSON.parse(localStorage.getItem('historicos_data') || '[]');
        let currentPage = 1;
        const itemsPerPage = 10;
        let editingIndex = -1;

        // Inicializar se houver dados salvos
        window.onload = () => {
            if (allHistoricos.length > 0) {
                document.getElementById('initial-modal').style.display = 'none';
                renderHistoricos();
            }
        };

        function saveToStorage() {
            localStorage.setItem('historicos_data', JSON.stringify(allHistoricos));
        }

        // Configuração do loader com efeito de blur progressivo
        async function showLoader(text) {
            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loader-text');
            const loaderPercent = document.getElementById('loader-percent');
            
            loaderText.innerText = text;
            loader.style.display = 'flex';
            
            for (let i = 0; i <= 100; i += 10) {
                loaderPercent.innerText = `${i}%`;
                loader.style.backdropFilter = `blur(${i / 10}px)`;
                await new Promise(r => setTimeout(r, 100));
            }
        }

        function hideLoader() {
            const loader = document.getElementById('loader');
            loader.style.display = 'none';
            loader.style.backdropFilter = 'blur(0px)';
        }

        // Upload e Processamento do PDF
        document.getElementById('pdf-upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('initial-modal').style.display = 'none';
            await showLoader('Extraindo dados do PDF...');

            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
                let extractedData = [];

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const lines = processTextItems(textContent.items);
                    
                    extractedData = extractedData.concat(parseLines(lines));
                }

                allHistoricos = extractedData;
                saveToStorage();
                renderHistoricos();
                hideLoader();
            } catch (error) {
                console.error(error);
                alert('Erro ao processar PDF');
                hideLoader();
                document.getElementById('initial-modal').style.display = 'flex';
            }
        });

        function processTextItems(items) {
            // Agrupar itens por coordenada Y (linhas)
            const linesMap = {};
            items.forEach(item => {
                const y = Math.round(item.transform[5]);
                if (!linesMap[y]) linesMap[y] = [];
                linesMap[y].push(item);
            });

            // Ordenar linhas de cima para baixo e itens da esquerda para a direita
            const sortedY = Object.keys(linesMap).sort((a, b) => b - a);
            return sortedY.map(y => {
                return linesMap[y].sort((a, b) => a.transform[4] - b.transform[4])
                                  .map(item => item.str)
                                  .join(' ');
            });
        }

        function parseLines(lines) {
            const results = [];
            // Regex para capturar código (4-5 dígitos) no início da linha seguido de descrição
            // Baseado no modelo: 0001     RECEBIMENTOS DURANTE O MES
            const regex = /^(\d{4,5})\s+(.+)$/;

            lines.forEach(line => {
                const match = line.trim().match(regex);
                if (match) {
                    const codigo = match[1];
                    let descricao = match[2];
                    
                    // Limpar descrição de campos extras como COMPLEMENTO, DEBITO, CREDITO que podem estar na mesma linha
                    // No PDF, esses campos estão bem à direita.
                    // Vamos pegar apenas a parte da descrição.
                    // Se houver múltiplos espaços seguidos de números grandes, truncamos.
                    const cleanDesc = descricao.split(/\s{5,}/)[0].trim();
                    
                    results.push({
                        codigo: codigo,
                        descricao: cleanDesc
                    });
                }
            });
            return results;
        }

        // Renderização e Paginação
        function renderHistoricos() {
            const tbody = document.getElementById('historicos-list');
            tbody.innerHTML = '';

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const paginatedItems = allHistoricos.slice(start, end);

            paginatedItems.forEach((item, index) => {
                const actualIndex = start + index;
                const tr = document.createElement('tr');
                tr.className = 'border-b border-white/5 hover:bg-white/5 transition-all';
                tr.innerHTML = `
                    <td class="p-4 font-mono text-blue-300">${item.codigo}</td>
                    <td class="p-4 opacity-90">${item.descricao}</td>
                    <td class="p-4 text-center">
                        <button onclick="editItem(${actualIndex})" class="text-yellow-400 hover:text-yellow-200 p-2"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteItem(${actualIndex})" class="text-red-400 hover:text-red-200 p-2"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            renderPagination();
        }

        function renderPagination() {
            const container = document.getElementById('pagination');
            container.innerHTML = '';
            
            const totalPages = Math.ceil(allHistoricos.length / itemsPerPage);
            if (totalPages <= 1) return;

            // Botão Anterior
            const prev = document.createElement('button');
            prev.className = 'pagination-btn';
            prev.innerHTML = '<i class="fas fa-chevron-left"></i>';
            prev.disabled = currentPage === 1;
            prev.onclick = () => { currentPage--; renderHistoricos(); };
            container.appendChild(prev);

            // Páginas (limitado para não quebrar o layout se forem muitas)
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, startPage + 4);
            if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

            for (let i = startPage; i <= endPage; i++) {
                const btn = document.createElement('button');
                btn.className = `pagination-btn ${i === currentPage ? 'active' : ''}`;
                btn.innerText = i;
                btn.onclick = () => { currentPage = i; renderHistoricos(); };
                container.appendChild(btn);
            }

            // Botão Próximo
            const next = document.createElement('button');
            next.className = 'pagination-btn';
            next.innerHTML = '<i class="fas fa-chevron-right"></i>';
            next.disabled = currentPage === totalPages;
            next.onclick = () => { currentPage++; renderHistoricos(); };
            container.appendChild(next);
        }

        // Ações
        function deleteItem(index) {
            if (confirm('Deseja excluir este histórico?')) {
                allHistoricos.splice(index, 1);
                saveToStorage();
                renderHistoricos();
            }
        }

        function editItem(index) {
            editingIndex = index;
            const item = allHistoricos[index];
            document.getElementById('edit-codigo').value = item.codigo;
            document.getElementById('edit-descricao').value = item.descricao;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.add('hidden');
            editingIndex = -1;
        }

        async function saveEdit() {
            const newDesc = document.getElementById('edit-descricao').value;
            await showLoader('Salvando alterações...');
            
            allHistoricos[editingIndex].descricao = newDesc;
            saveToStorage();
            renderHistoricos();
            
            setTimeout(() => {
                hideLoader();
                closeEditModal();
            }, 500);
        }

        function showImportModal() {
            document.getElementById('pdf-upload').value = '';
            document.getElementById('initial-modal').style.display = 'flex';
        }

        async function generateTxt() {
            if (allHistoricos.length === 0) {
                alert('Nenhum dado para exportar.');
                return;
            }

            await showLoader('Gerando arquivo TXT...');

            // Formato: codigo;descricao
            const content = allHistoricos.map(h => `${h.codigo};${h.descricao}`).join('\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'importar_históricos.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            setTimeout(hideLoader, 800);
        }
    </script>
</body>
</html>
